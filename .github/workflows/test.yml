name: Backend Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Type-check & Jest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Tests mock the DB + Twilio (see jest.setup.js) and JWT_SECRET has a fallback,
      # so no database or secrets are required in CI.
      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:ci
